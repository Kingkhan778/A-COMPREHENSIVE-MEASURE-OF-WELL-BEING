<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HDI Nexus | Prediction Portal</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <h2>
        <span class="logo">◈</span>
        HDI Nexus
    </h2>

    <nav>

        <a href="/">Home</a>

        <a href="/predict">Predict</a>

        <a href="/about">About</a>

    </nav>

</header>


<div class="container">

    <h1>HDI Prediction Portal</h1>

    <p class="subtitle">

        Enter the socioeconomic indicators below to estimate the Human Development Index using our Machine Learning model.

    </p>

    <form action="/predict" method="POST">

        <label>❤️ Life Expectancy (Years)</label>

        <input
            type="number"
            name="life"
            min="20"
            max="90"
            step="0.01"
            placeholder="Example: 75.4"
            required
        >

        <label>🎓 Expected Years of Schooling</label>

        <input
            type="number"
            name="expected"
            min="1"
            max="25"
            step="0.01"
            placeholder="Example: 16.5"
            required
        >

        <label>📚 Mean Years of Schooling</label>

        <input
            type="number"
            name="mean"
            min="1"
            max="18"
            step="0.01"
            placeholder="Example: 11.8"
            required
        >

        <label>💰 Gross National Income (PPP $)</label>

        <input
            type="number"
            name="gni"
            min="100"
            max="150000"
            step="0.01"
            placeholder="Example: 32000"
            required
        >

        <br><br>

        <button type="submit">

            🚀 Run Prediction

        </button>

    </form>

</div>

<footer>

    <p>

        HDI Nexus • AI Prediction Dashboard

    </p>

</footer>

</body>

</html>
